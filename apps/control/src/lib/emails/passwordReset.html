<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Raincloud Password Reset</title>
        <link
          href="https://api.fontshare.com/v2/css?f[]=satoshi@500,700&display=swap"
          rel="stylesheet"
        />
    </head>

    <style>
        :root {
            --background: oklch(0.2155 0.0254 284.0647);
            --card: oklch(0.2429 0.0304 283.911);
            --foreground: oklch(0.8787 0.0426 272.2767);
            --muted-foreground: oklch(0.751 0.0396 273.932);
            --border: oklch(0.324 0.0319 281.9784);
            --primary: oklch(0.7664 0.1113 259.885);
            --primary-foreground: oklch(0.2155 0.0254 284.0647);
            --ctp-crust: #11111b;
        }

        body {
            font-family: "Satoshi", sans-serif;
            color: var(--foreground);
            background-color: var(--background);
            display: flex;
            height: 100vh;
            margin: 0;
        }

        .root {
            margin: auto;
            text-align: center;
        }

        .name {
            font-weight: 700;
        }

        .content {
            background-color: var(--card);
            padding: 0.8rem 1.25rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            text-align: left;
            max-width: 20rem;
            display: flex;
            flex-direction: column;
        }

        h2 {
            line-height: 0;
        }

        .desc {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        .btn {
            margin: 0.5rem auto;
            background-color: var(--primary);
            color: var(--primary-foreground);
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            text-decoration: none;
        }

        a:not(.btn) {
            color: var(--primary);
        }
    </style>

    <body>
        <div class="root">
            <p class="name">Raincloud</p>

            <div class="content">
                <h2>Password Reset</h2>

                <p class="desc">
                    You are recieving this email because someone requested a password reset for your account,
                    if this was not you then you can safely ignore this email. The link expires in one hour.
                </p>

                <a href="{{resetUrl}}" class="btn">Reset Password</a>

                <p class="desc">
                    If you have any issues or questions, please contact <a href="mailto:support@raincloudns.dev">support@raincloudns.dev</a>
                </p>
            </div>
        </div>
    </body>
</html>
